<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Inter', system-ui, sans-serif;
    background: #0B0F1A;
  }
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800&display=swap');

  .card {
    width: 1200px;
    height: 630px;
    position: relative;
    display: flex;
    align-items: center;
    overflow: hidden;
  }

  /* background photo */
  .photo {
    position: absolute;
    right: 0; top: 0;
    width: 55%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
  }

  /* gradient over photo */
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      90deg,
      #0B0F1A 42%,
      rgba(11,15,26,0.85) 60%,
      rgba(11,15,26,0.2) 100%
    );
  }

  .content {
    position: relative;
    z-index: 2;
    padding: 60px 70px;
    max-width: 620px;
  }

  .logo {
    height: 40px;
    width: auto;
    filter: brightness(0) invert(1);
    margin-bottom: 32px;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(96,247,250,0.12);
    border: 1px solid rgba(96,247,250,0.3);
    color: #60f7fa;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 100px;
    margin-bottom: 24px;
  }
  .tag-dot { width: 6px; height: 6px; border-radius: 50%; background: #60f7fa; }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 88px;
    line-height: 0.95;
    color: #fff;
    letter-spacing: 0.01em;
    margin-bottom: 20px;
  }
  h1 em {
    font-family: 'Georgia', serif;
    font-style: italic;
    color: #60f7fa;
  }

  .sub {
    font-size: 18px;
    color: #94a3b8;
    line-height: 1.5;
    margin-bottom: 36px;
    font-weight: 400;
  }

  .socials {
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .social-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 100px;
    padding: 8px 16px;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
  }
  .social-pill svg { width: 18px; height: 18px; flex-shrink: 0; }

  .domain {
    position: absolute;
    bottom: 32px;
    left: 70px;
    font-size: 14px;
    color: #43797d;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
<div class="card">
  <img class="photo" src="Charles Headshot.png" alt="">
  <div class="overlay"></div>
  <div class="content">
    <img class="logo" src="https://cdn.prod.website-files.com/67c0ca361b44fd783e89fbb8/67c0cb31303d312489ee7da5_IAMNURSE%20CLEAR.png" alt="IAMNURSE">
    <div class="tag"><span class="tag-dot"></span> ER Nurse · Atlanta, GA</div>

</div>
</body>
</html>
